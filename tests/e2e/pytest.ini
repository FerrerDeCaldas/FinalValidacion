[tool:pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .

# Markers
markers =
    manufacturing: Tests for Manufacturing module
    quality_management: Tests for Quality Management module
    shopping_cart: Tests for Shopping Cart module
    e2e: End-to-end integration tests
    slow: Slow running tests
    unit: Unit tests
    integration: Integration tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Frappe specific
frappe_site = None
