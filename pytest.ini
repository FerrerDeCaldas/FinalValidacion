[pytest]
# Pytest configuration for unit tests

testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    unit: Unit tests
    manufacturing: Manufacturing module tests
    quality: Quality Management module tests
    shopping_cart: Shopping Cart module tests
    slow: Slow running tests
