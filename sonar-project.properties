# SonarQube / SonarCloud configuration for the FinalValidacion repository
# Adapted to analyze source code in erpnext and banking, while excluding test files and semgrep output.

sonar.projectKey=ferrerdecaldas_final-validacion-local
sonar.projectName=Final Validacion Local
sonar.projectVersion=1.0
sonar.organization=ferrerdecaldas
sonar.host.url=https://sonarcloud.io

# Source code directories
sonar.sources=erpnext,banking
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.sourceEncoding=UTF-8

# Exclusions: Extended to ignore front-end templates causing parsing errors
sonar.exclusions=tests/**,semgrep/**,**/__pycache__/**,**/*.pyc,**/*.json,**/*.md,**/node_modules/**,**/dist/**,**/*.html,**/templates/**/*.js
sonar.coverage.exclusions=tests/**,semgrep/**,**/*.html,**/templates/**/*.js

# Coverage report generated by pytest-cov in XML format
sonar.python.coverage.reportPaths=coverage.xml