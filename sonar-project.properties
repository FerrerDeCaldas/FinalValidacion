# Adapted to analyze source code in erpnext and banking, while excluding test files and semgrep output.

sonar.projectKey=FerrerDeCaldas_FinalValidacion
sonar.projectName=FerrerDeCaldas_FinalValidacion
sonar.projectVersion=1.0

# Source code directories
sonar.sources=erpnext,banking
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.sourceEncoding=UTF-8

# Exclusions: do not analyze test artifacts or semgrep snapshots
sonar.exclusions=tests/**,semgrep/**,**/__pycache__/**,**/*.pyc,**/*.json,**/*.md,**/node_modules/**,**/dist/**
sonar.coverage.exclusions=tests/**,semgrep/**

# Coverage report generated by pytest-cov in XML format
sonar.python.coverage.reportPaths=coverage.xml

# Use this only for local SonarQube, or override on CLI if needed
# sonar.host.url=http://localhost:9000
# sonar.login=<YOUR_TOKEN>
